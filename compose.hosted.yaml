services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: locus
      POSTGRES_USER: locus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - locus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locus -d locus"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true

  metapost:
    build:
      context: ./docker/metapost
    restart: unless-stopped
    environment:
      PORT: "8090"
      MAX_CONCURRENCY: "2"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,uid=65534,gid=65534,mode=0700
      - /work:rw,noexec,nosuid,nodev,size=64m,uid=65534,gid=65534,mode=0700
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 96
    mem_limit: 512m
    cpus: 1.0
    networks:
      - visualization
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10

  pdf2markdown:
    build:
      context: ./docker/pdf2markdown
    restart: unless-stopped
    environment:
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?MISTRAL_API_KEY is required}
      MISTRAL_API_KEY_ID: ${MISTRAL_API_KEY_ID:-embedded}
      MISTRAL_OCR_MODEL: ${MISTRAL_OCR_MODEL:-mistral-ocr-4-0}
      MISTRAL_TIMEOUT_SECONDS: ${MISTRAL_TIMEOUT_SECONDS:-600}
      PDF2MARKDOWN_API_TOKEN: ${PDF2MARKDOWN_API_TOKEN:?PDF2MARKDOWN_API_TOKEN is required}
      PDF2MARKDOWN_ADMIN_TOKEN: ${PDF2MARKDOWN_ADMIN_TOKEN:?PDF2MARKDOWN_ADMIN_TOKEN is required}
      PDF2MARKDOWN_SIGNING_SECRET: ${PDF2MARKDOWN_SIGNING_SECRET:?PDF2MARKDOWN_SIGNING_SECRET is required}
      PDF2MARKDOWN_REQUIRE_AUTH: "true"
      PDF2MARKDOWN_DATA_ROOT: /data/pdf2markdown
      PDF2MARKDOWN_MAX_UPLOAD_MB: ${PDF2MARKDOWN_MAX_UPLOAD_MB:-100}
      PDF2MARKDOWN_MAX_PAGES: ${PDF2MARKDOWN_MAX_PAGES:-1000}
      PDF2MARKDOWN_MAX_CONCURRENT_JOBS: ${PDF2MARKDOWN_MAX_CONCURRENT_JOBS:-4}
      PDF2MARKDOWN_MAX_QUEUED_JOBS: ${PDF2MARKDOWN_MAX_QUEUED_JOBS:-100}
      PDF2MARKDOWN_DEFAULT_USER_MONTHLY_PAGE_CAP: ${PDF2MARKDOWN_DEFAULT_USER_MONTHLY_PAGE_CAP:-}
      PDF2MARKDOWN_DEFAULT_KEY_MONTHLY_PAGE_CAP: ${PDF2MARKDOWN_DEFAULT_KEY_MONTHLY_PAGE_CAP:-}
    volumes:
      - locus_pdf2markdown_data:/data/pdf2markdown
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=${PDF2MARKDOWN_TMPFS_SIZE:-2g}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 3g
    cpus: 4.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  migrate:
    build:
      context: .
    command: ["node", "build/server/migrate-cli.mjs"]
    environment:
      NODE_ENV: production
      LOCUS_MODE: hosted
      LOCUS_PUBLIC_ORIGIN: ${LOCUS_PUBLIC_ORIGIN:?LOCUS_PUBLIC_ORIGIN is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      LOCUS_CREDENTIAL_KEYS: ${LOCUS_CREDENTIAL_KEYS:?LOCUS_CREDENTIAL_KEYS is required}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:?POSTMARK_SERVER_TOKEN is required}
      METAPOST_SERVICE_URL: http://metapost:8090
      LOCUS_MAX_CONCURRENT_GENERATIONS: "3"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOCUS_MODE: hosted
      LOCUS_PUBLIC_ORIGIN: ${LOCUS_PUBLIC_ORIGIN:?LOCUS_PUBLIC_ORIGIN is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      LOCUS_CREDENTIAL_KEYS: ${LOCUS_CREDENTIAL_KEYS:?LOCUS_CREDENTIAL_KEYS is required}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:?POSTMARK_SERVER_TOKEN is required}
      METAPOST_SERVICE_URL: http://metapost:8090
      PDF2MARKDOWN_SERVICE_URL: http://pdf2markdown:8000
      PDF2MARKDOWN_API_TOKEN: ${PDF2MARKDOWN_API_TOKEN:?PDF2MARKDOWN_API_TOKEN is required}
      PDF2MARKDOWN_ADMIN_TOKEN: ${PDF2MARKDOWN_ADMIN_TOKEN:?PDF2MARKDOWN_ADMIN_TOKEN is required}
      LOCUS_MAX_CONCURRENT_GENERATIONS: "3"
      HOST: 0.0.0.0
      PORT: "8787"
    depends_on:
      migrate:
        condition: service_completed_successfully
      metapost:
        condition: service_healthy
      pdf2markdown:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,uid=1000,gid=1000,mode=0700
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 1g
    cpus: 2.0
    expose:
      - "8787"
    networks:
      - default
      - visualization
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  locus_postgres_data:
  locus_pdf2markdown_data:

networks:
  visualization:
    internal: true
